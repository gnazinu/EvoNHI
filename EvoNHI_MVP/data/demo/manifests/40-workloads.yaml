apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-gateway
  namespace: edge
  annotations:
    evonhi.io/public: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-gateway
  template:
    metadata:
      labels:
        app: public-gateway
    spec:
      serviceAccountName: gateway-sa
      containers:
        - name: app
          image: nginx:stable
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: public-gateway-token
                  key: token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      serviceAccountName: payments-sa
      volumes:
        - name: db-secret
          secret:
            secretName: payments-db-secret
      containers:
        - name: app
          image: nginx:stable
          volumeMounts:
            - name: db-secret
              mountPath: /run/secret
