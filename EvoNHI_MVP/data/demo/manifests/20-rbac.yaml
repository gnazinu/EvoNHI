apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-secret-reader
  namespace: edge
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-gateway-secret-reader
  namespace: edge
subjects:
  - kind: ServiceAccount
    name: gateway-sa
    namespace: edge
roleRef:
  kind: Role
  name: gateway-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workload-pivot-role
rules:
  - apiGroups: ["apps", ""]
    resources: ["deployments", "pods", "secrets"]
    verbs: ["create", "patch", "update", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bind-gateway-pivot-role
subjects:
  - kind: ServiceAccount
    name: gateway-sa
    namespace: edge
roleRef:
  kind: ClusterRole
  name: workload-pivot-role
  apiGroup: rbac.authorization.k8s.io
